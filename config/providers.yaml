providers:
  openai:
    type: llm
    models:
      gpt-4o:
        name: "GPT-4o"
        type: llm
        pricing:
          input: 0.005
          output: 0.015
        api_key_env: OPENAI_API_KEY
        max_tokens: 4096
        temperature_range: [0.0, 2.0]
      
      gpt-4o-mini:
        name: "GPT-4o Mini"
        type: llm
        pricing:
          input: 0.00015
          output: 0.0006
        api_key_env: OPENAI_API_KEY
        max_tokens: 16384
        temperature_range: [0.0, 2.0]
      
      gpt-3.5-turbo:
        name: "GPT-3.5 Turbo"
        type: llm
        pricing:
          input: 0.0005
          output: 0.0015
        api_key_env: OPENAI_API_KEY
        max_tokens: 16384
        temperature_range: [0.0, 2.0]

  huggingface:
    type: slm
    models:
      microsoft/phi-3-mini-4k-instruct:
        name: "Phi-3 Mini 4K Instruct"
        type: slm
        pricing: null  # No hay pricing público
        api_key_env: HUGGINGFACE_API_KEY
        endpoint_env: HUGGINGFACE_ENDPOINT_URL
        max_tokens: 4096
        temperature_range: [0.0, 1.0]
      
      Qwen2.5-1.5B-Instruct:
        name: "Qwen2.5 1.5B Instruct"
        type: slm
        pricing: null
        api_key_env: HUGGINGFACE_API_KEY
        endpoint_env: HUGGINGFACE_ENDPOINT_URL
        max_tokens: 8192
        temperature_range: [0.0, 1.0]

  ollama:
    type: slm
    base_url_env: OLLAMA_BASE_URL
    models:
      phi3:mini:
        name: "Phi-3 Mini (Ollama)"
        type: slm
        pricing: null
        max_tokens: 4096
        temperature_range: [0.0, 1.0]
      
      qwen2.5:1.5b-instruct:
        name: "Qwen2.5 1.5B Instruct (Ollama)"
        type: slm
        pricing: null
        max_tokens: 8192
        temperature_range: [0.0, 1.0]
      
      llama3.2:1b:
        name: "Llama 3.2 1B (Ollama)"
        type: slm
        pricing: null
        max_tokens: 4096
        temperature_range: [0.0, 1.0]

  mock:
    type: mock
    models:
      mock-slm:
        name: "Mock SLM"
        type: slm
        pricing: null
        latency_range_ms: [50, 120]
        max_tokens: 512
        temperature_range: [0.0, 1.0]
      
      mock-llm:
        name: "Mock LLM"
        type: llm
        pricing: null
        latency_range_ms: [400, 1200]
        max_tokens: 2048
        temperature_range: [0.0, 2.0]
